name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.local
        run: |
          cat > .env.local << 'ENVEOF'
          NODE_ENV=production
          ENVEOF
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.local
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env.local
          echo "NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}" >> .env.local
        #   echo "NEXT_PUBLIC_GOOGLE_MAP_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_API_KEY }}" >> .env.local
        #   echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env.local
        #   echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env.local
        #   echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env.local
        #   echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env.local
        #   echo "SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}" >> .env.local
        #   echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env.local
        #   echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env.local

      - name: Build project
        run: pnpm build

      - name: Package build artifacts
        run: |
          tar -czf deploy.tar.gz \
            .next \
            public \
            package.json \
            pnpm-lock.yaml \
            next.config.mjs \
            src/env.mjs \
            ecosystem.config.js \
            .env.local

      - name: Copy artifacts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: deploy.tar.gz
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ${{ secrets.DEPLOY_PATH }}

            # Extract build artifacts
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Install production dependencies
            pnpm install --frozen-lockfile --prod

            # Start or restart PM2 process
            if pm2 describe perfomax-client > /dev/null 2>&1; then
              echo "Process exists, restarting..."
              pm2 restart perfomax-client
            else
              echo "First deploy, starting process..."
              pm2 start ecosystem.config.js
              pm2 save
            fi

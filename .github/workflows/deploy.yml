name: Deploy VShips Client

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: 1
  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
  UAT_EMAIL: ${{ secrets.UAT_EMAIL }}
  UAT_PASSWORD: ${{ secrets.UAT_PASSWORD }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, vships]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env.local file
        run: |
          echo "NODE_ENV=production" > .env.local
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.local
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env.local
          echo "NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}" >> .env.local
          echo "UAT_EMAIL=${{ secrets.UAT_EMAIL }}" >> .env.local
          echo "UAT_PASSWORD=${{ secrets.UAT_PASSWORD }}" >> .env.local
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env.local
          echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" >> .env.local

      - name: Install dependencies
        run: |
          rm -rf node_modules
          pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Start application with PM2
        run: |
          pm2 delete vships-client 2>/dev/null || true
          pm2 start ecosystem.config.js
          pm2 save

          echo "Application started on port 4001"

      - name: Health check
        run: |
          sleep 10
          pm2 status vships-client
          pm2 logs vships-client --lines 20 --nostream || true

      - name: Cleanup
        run: |
          pm2 flush vships-client || true

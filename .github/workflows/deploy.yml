name: Deploy Perfomax Client

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: 1
  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
  NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
  UAT_EMAIL: ${{ secrets.UAT_EMAIL }}
  UAT_PASSWORD: ${{ secrets.UAT_PASSWORD }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env.local file
        run: |
          cat > .env.local << EOF
          NODE_ENV=production
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}
          UAT_EMAIL=${{ secrets.UAT_EMAIL }}
          UAT_PASSWORD=${{ secrets.UAT_PASSWORD }}
          EOF

      - name: Install pnpm (if not installed)
        run: |
          if ! command -v pnpm &> /dev/null; then
            npm install -g pnpm
          fi

      - name: Install dependencies
        run: |
          rm -rf node_modules
          pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Deploy to permanent location
        run: |
          DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"

          echo "Deploying to $DEPLOY_DIR..."
          mkdir -p $DEPLOY_DIR

          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ $DEPLOY_DIR/

          echo "Files deployed to $DEPLOY_DIR"
          ls -la $DEPLOY_DIR/

      - name: Install PM2 globally (if not installed)
        run: |
          if ! command -v pm2 &> /dev/null; then
            npm install -g pm2
          fi

      - name: Start application with PM2
        run: |
          DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
          cd $DEPLOY_DIR

          pm2 delete perfomax-client 2>/dev/null || true
          pm2 start ecosystem.config.js
          pm2 save

          echo "Application started from $DEPLOY_DIR on port 4000"

      - name: Health check
        run: |
          sleep 10
          pm2 status perfomax-client
          pm2 logs perfomax-client --lines 20 --nostream || true

      - name: Cleanup
        run: |
          pm2 flush perfomax-client || true

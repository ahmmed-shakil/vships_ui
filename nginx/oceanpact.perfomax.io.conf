server {
    listen 80;
    server_name oceanpact.perfomax.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name oceanpact.perfomax.io;

    # SSL — managed by Certbot (or replace with your cert paths)
    ssl_certificate     /etc/letsencrypt/live/oceanpact.perfomax.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oceanpact.perfomax.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Proxy to Next.js on port 4000
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR / real-time data)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:4000;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    # Cache public assets
    location /public/ {
        proxy_pass http://127.0.0.1:4000;
        expires    30d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    client_max_body_size 20M;
}
